# ─── Doctor Appointment Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-appointment
  namespace: backend
  labels:
    app: doctor-appointment
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doctor-appointment
  template:
    metadata:
      labels:
        app: doctor-appointment
        tier: backend
    spec:
      containers:
        - name: doctor-appointment
          image: revanth654/healthcare-doctor-appointment:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: RABBITMQ_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always
