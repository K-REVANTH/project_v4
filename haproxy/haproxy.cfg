#---------------------------------------------------------------------
# HAProxy Configuration — Healthcare Microservices
# Runs on MASTER NODE as host-level service (outside K8s)
#
# WHY HOST-LEVEL (not K8s pod):
# 1. No chicken-and-egg: HAProxy works even if K8s has issues
# 2. No pod resource overhead
# 3. Directly binds to master node's public IP
#
# SETUP: sudo ./scripts/setup-haproxy.sh <WORKER1_IP> <WORKER2_IP>
#---------------------------------------------------------------------

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

#---------------------------------------------------------------------
# Stats page: http://<MASTER_IP>:8404/stats
#---------------------------------------------------------------------
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

#---------------------------------------------------------------------
# API traffic: port 80 → K8s Gateway NodePort 30080
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    default_backend k8s_gateway

backend k8s_gateway
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    # Replace with actual worker node IPs
    server worker-1 <WORKER_NODE_1_IP>:30080 check inter 5s fall 3 rise 2
    server worker-2 <WORKER_NODE_2_IP>:30080 check inter 5s fall 3 rise 2

#---------------------------------------------------------------------
# Frontend traffic: port 3000 → K8s Frontend NodePort 30000
#---------------------------------------------------------------------
frontend frontend_http
    bind *:3000
    default_backend k8s_frontend

backend k8s_frontend
    balance roundrobin
    server worker-1 <WORKER_NODE_1_IP>:30000 check inter 5s fall 3 rise 2
    server worker-2 <WORKER_NODE_2_IP>:30000 check inter 5s fall 3 rise 2
