# ════════════════════════════════════════════════════════════
# User Management Deployment — 3-Node Optimized
# ════════════════════════════════════════════════════════════
# CONCEPTS DEMONSTRATED:
# - Init Containers (wait for MongoDB + RabbitMQ)
# - ServiceAccount (backend-sa)
# - podAntiAffinity (spread replicas across worker nodes)
# - Resource limits (strict for 3-node cluster)
# - ConfigMap + Secret env injection

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management
  namespace: backend
  labels:
    app: user-management
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-management
  template:
    metadata:
      labels:
        app: user-management
        tier: backend
    spec:
      serviceAccountName: backend-sa
      # ─── Spread replicas across worker nodes ───
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - user-management
                topologyKey: kubernetes.io/hostname
      # ─── Init Containers: dependency checks ───
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              'echo "Waiting for MongoDB..."; until nc -z mongodb-headless.infra.svc.cluster.local 27017; do echo "MongoDB not ready"; sleep 2; done; echo "MongoDB OK"',
            ]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              'echo "Waiting for RabbitMQ..."; until nc -z rabbitmq.infra.svc.cluster.local 5672; do echo "RabbitMQ not ready"; sleep 2; done; echo "RabbitMQ OK"',
            ]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
      containers:
        - name: user-management
          image: revanth654/healthcare-user-management:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: RABBITMQ_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: JWT_EXPIRY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      restartPolicy: Always
