# ════════════════════════════════════════════════════════════
# Doctor Appointment — Sidecar Pattern + podAntiAffinity
# ════════════════════════════════════════════════════════════
# CONCEPTS DEMONSTRATED:
# - Sidecar container (log-forwarder)
# - Init container (wait for MongoDB)
# - Shared emptyDir volume between containers
# - podAntiAffinity (spread across nodes)
# - ServiceAccount

apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-appointment
  namespace: backend
  labels:
    app: doctor-appointment
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doctor-appointment
  template:
    metadata:
      labels:
        app: doctor-appointment
        tier: backend
    spec:
      serviceAccountName: backend-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - doctor-appointment
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mongodb-headless.infra.svc.cluster.local 27017; do sleep 2; done",
            ]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
      containers:
        # ─── Main Application Container ───
        - name: doctor-appointment
          image: revanth654/healthcare-doctor-appointment:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: RABBITMQ_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: LOG_FILE
              value: "/var/log/app/doctor-appointment.log"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
        # ─── Sidecar: Log Forwarder ───
        # Reads logs from shared volume and outputs to stdout
        # In production: would be Fluent Bit forwarding to Elasticsearch
        - name: log-forwarder
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "touch /var/log/app/doctor-appointment.log && tail -F /var/log/app/doctor-appointment.log",
            ]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
              readOnly: true
      volumes:
        - name: app-logs
          emptyDir: {}
      restartPolicy: Always
