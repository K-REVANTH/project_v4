# ════════════════════════════════════════════════════════════
# MongoDB StatefulSet — 3-Node Cluster Optimized
# ════════════════════════════════════════════════════════════
#
# DESIGN DECISIONS FOR 3-NODE CONSTRAINT:
# 1. nodeAffinity: Pin MongoDB to worker-1 for stability
#    (databases need consistent disk I/O — don't let scheduler move it)
# 2. Label your target node: kubectl label node <worker-1> role=database
# 3. Single replica (can't do replica set with only 2 workers)
#
# WHY StatefulSet (not Deployment):
# - Stable network identity: mongodb-0 (always the same pod name)
# - Ordered startup/shutdown (safe for databases)
# - Each replica gets its own PVC that survives restarts
#
# STORAGE: Uses NFS StorageClass for dynamic provisioning
# NFS server runs on the master node (see scripts/setup-nfs.sh)

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: infra
  labels:
    app: mongodb
spec:
  serviceName: mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      # ─── Pin MongoDB to a labeled node for stability ───
      # Setup: kubectl label node <worker-node-1> role=database
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - database
      # ─── Init Container: verify storage is writable ───
      initContainers:
        - name: init-check-storage
          image: busybox:1.36
          command: ['sh', '-c', 'echo "Storage check: $(date)" > /data/db/.storage-test && echo "Storage OK" && rm /data/db/.storage-test']
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        storageClassName: nfs-dynamic
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
