# ════════════════════════════════════════════════════════════
# Deployment Strategies — RollingUpdate vs Recreate
# ════════════════════════════════════════════════════════════

# ─── Strategy 1: RollingUpdate (zero-downtime) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy
  namespace: backend
  labels:
    app: pharmacy
    tier: backend
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pharmacy
  template:
    metadata:
      labels:
        app: pharmacy
        tier: backend
    spec:
      serviceAccountName: backend-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - pharmacy
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mongodb-headless.infra.svc.cluster.local 27017; do sleep 2; done",
            ]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
      containers:
        - name: pharmacy
          image: revanth654/healthcare-pharmacy:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 5
      restartPolicy: Always
---
# ─── Strategy 2: Recreate (kills all before creating new) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-records
  namespace: backend
  labels:
    app: medical-records
    tier: backend
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: medical-records
  template:
    metadata:
      labels:
        app: medical-records
        tier: backend
    spec:
      serviceAccountName: backend-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - medical-records
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mongodb-headless.infra.svc.cluster.local 27017; do sleep 2; done",
            ]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
      containers:
        - name: medical-records
          image: revanth654/healthcare-medical-records:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              value: "5002"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: RABBITMQ_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 5
      restartPolicy: Always
